name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: gosend
          MYSQL_DATABASE: gosend
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pgosend"
          --health-interval=5s --health-timeout=3s --health-retries=20
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: gosend
          POSTGRES_DB: gosend
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d gosend"
          --health-interval=5s --health-timeout=3s --health-retries=20
    env:
      GOSEND_TEST_MYSQL_DSN: root:gosend@tcp(127.0.0.1:3306)/gosend?charset=utf8mb4
      GOSEND_TEST_POSTGRES_DSN: postgres://postgres:gosend@127.0.0.1:5432/gosend?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./... -count=1
      - run: go test -race ./... -count=1

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go build -trimpath ./cmd/gosend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
